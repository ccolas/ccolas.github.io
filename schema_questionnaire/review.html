<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Revue des réponses YSQ-L3</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="review">
    <header class="app-header">
      <div>
        <p class="eyebrow">YSQ-L3</p>
        <h1>Revue des réponses</h1>
      </div>
      <a class="header-link" href="index.html">Questionnaire</a>
    </header>

    <main class="shell">
      <section class="upload-panel" aria-labelledby="upload-title">
        <div>
          <h2 id="upload-title">Importer un fichier de réponses</h2>
          <p>Le fichier est lu localement dans le navigateur. Aucune donnée n'est envoyée.</p>
        </div>
        <label class="file-drop" id="drop-zone">
          <input id="answers-file" type="file" accept="application/json,.json">
          <span>Sélectionner ou déposer un fichier JSON</span>
        </label>
        <p id="file-error" class="validation-message" role="alert"></p>
      </section>

      <section id="review-content" hidden>
        <section id="summary" class="summary-grid" aria-label="Résumé"></section>
        <section class="score-panel" aria-labelledby="scores-title">
          <h2 id="scores-title">Résumé par schéma</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Schéma</th>
                  <th>Réponses</th>
                  <th>Somme</th>
                  <th>Moyenne</th>
                  <th>5-6</th>
                  <th>Commentaires</th>
                </tr>
              </thead>
              <tbody id="score-table"></tbody>
            </table>
          </div>
        </section>
        <section id="schema-sections" class="schema-sections" aria-label="Détail par schéma"></section>
      </section>
    </main>

    <script src="ysq-data.js"></script>
    <script src="scoring.js"></script>
    <script src="review.js"></script>
  </body>
</html>
